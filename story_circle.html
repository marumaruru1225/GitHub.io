<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY CIRCLE - FILM THEORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* サークル配置用の計算 */
        .step-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* 脈動する装飾効果 */
        @keyframes pulse-subtle {
            0%, 100% { transform: scale(1); opacity: 0.03; }
            50% { transform: scale(1.08); opacity: 0.08; }
        }
        .pulse-bg {
            animation: pulse-subtle 4s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-[#111111] font-sans antialiased min-h-screen flex flex-col justify-between tracking-wide">

    <header class="border-b border-gray-200 bg-white px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-base font-bold tracking-widest text-[#111111]">STORY CIRCLE</h1>
            <p class="text-[10px] text-gray-400 font-medium tracking-wider uppercase mt-0.5">Dan Harmon's 8 Steps / Film Theory</p>
        </div>
        <a href="eizoron.html" class="text-xs text-gray-400 hover:text-black uppercase tracking-widest transition-colors underline underline-offset-4">
            Back to Topics
        </a>
    </header>

    <main class="max-w-6xl w-full mx-auto px-6 py-12 flex-grow flex flex-col md:flex-row items-center justify-center gap-12 lg:gap-24">
        
        <div class="relative w-[320px] h-[320px] flex-shrink-0 flex items-center justify-center select-none">
            
            <div class="absolute rounded-full border border-dashed border-gray-200 pointer-events-none" style="width: 240px; height: 240px;"></div>
            
            <div class="absolute w-[300px] h-[1px] bg-gradient-to-r from-transparent via-gray-200 to-transparent pointer-events-none"></div>
            <div class="absolute left-0 top-[51%] -translate-y-1/2 text-[8px] font-bold text-gray-400 tracking-wider pointer-events-none uppercase">
                ORDER
            </div>
            <div class="absolute right-0 top-[51%] -translate-y-1/2 text-[8px] font-bold text-gray-400 tracking-wider pointer-events-none uppercase text-right">
                CHAOS
            </div>

            <div class="absolute" style="width: 240px; height: 240px;">
                <div onclick="selectStep(1)" id="node-1" class="step-node" style="left: 120px; top: 0px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs shadow-sm bg-white border-[#111111] text-[#111111]">1</span>
                </div>
                <div onclick="selectStep(2)" id="node-2" class="step-node" style="left: 205px; top: 35px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">2</span>
                </div>
                <div onclick="selectStep(3)" id="node-3" class="step-node" style="left: 240px; top: 120px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">3</span>
                </div>
                <div onclick="selectStep(4)" id="node-4" class="step-node" style="left: 205px; top: 205px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">4</span>
                </div>
                <div onclick="selectStep(5)" id="node-5" class="step-node" style="left: 120px; top: 240px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">5</span>
                </div>
                <div onclick="selectStep(6)" id="node-6" class="step-node" style="left: 35px; top: 205px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">6</span>
                </div>
                <div onclick="selectStep(7)" id="node-7" class="step-node" style="left: 0px; top: 120px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">7</span>
                </div>
                <div onclick="selectStep(8)" id="node-8" class="step-node" style="left: 35px; top: 35px;">
                    <span class="flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400">8</span>
                </div>
            </div>

            <div class="absolute rounded-full bg-white border border-gray-100 shadow-sm flex flex-col items-center justify-center pointer-events-none z-10" style="width: 110px; height: 110px;">
                <span id="center-num" class="text-[10px] font-bold text-gray-400 tracking-widest">STEP 1</span>
                <span id="center-name" class="text-sm font-bold tracking-wider text-[#111111] uppercase mt-0.5">YOU</span>
                <span id="center-jp" class="text-[9px] text-gray-400 font-medium mt-0.5">主人公</span>
            </div>
            
            <div class="absolute rounded-full bg-[#111111] pulse-bg opacity-5 pointer-events-none" style="width: 150px; height: 150px;"></div>

        </div>

        <div class="w-full max-w-xl bg-white border border-gray-200 shadow-sm rounded-xl p-6 lg:p-8 flex flex-col justify-between min-h-[260px]">
            <div>
                <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                    <div class="flex items-center space-x-3">
                        <span id="info-badge" class="px-2.5 py-1 rounded text-xs font-bold text-white uppercase bg-[#111111]">
                            1. YOU / 主人公
                        </span>
                        <span id="info-status" class="text-xs font-medium text-gray-500 px-2 py-1 rounded bg-gray-100">
                            日常の平穏
                        </span>
                    </div>
                    <span id="info-english" class="text-xs font-mono font-bold text-gray-400">
                        "Comfort Zone"
                    </span>
                </div>
                
                <p id="info-desc" class="text-sm text-gray-700 leading-relaxed font-normal mt-4 transition-opacity duration-200">
                    主人公は現在、自分にとって最も快適で馴染み深い「安全な場所」にいます。しかし、その安定の中には、まだ見ぬ変化の予兆が静かに潜んでいます。
                </p>
            </div>

            <div class="flex items-start space-x-2 text-xs mt-6 pt-4 border-t border-dashed border-gray-200">
                <span class="text-gray-400 font-bold flex-shrink-0">ワンポイント:</span>
                <span id="info-tip" class="font-medium text-gray-600">
                    視聴者が共感できるように、主人公の「不完全な日常」を描きます。
                </span>
            </div>
        </div>

    </main>

    <footer class="border-t border-gray-200 bg-white py-4 text-center text-[10px] text-gray-400 tracking-wider">
        &copy; FILM THEORY DIGITAL ARCHIVE
    </footer>

    <script>
        const stepsData = {
            1: { name: "YOU", jp: "主人公", status: "日常の平穏", english: "Comfort Zone", desc: "主人公は現在、自分にとって最も快適で馴染み深い「安全な場所」にいます。しかし、その安定の中には、まだ見ぬ変化の予兆が静かに潜んでいます。", tip: "視聴者が共感できるように、主人公の「不完全な日常」を描きます。" },
            2: { name: "NEED", jp: "中身の欲求", status: "内的な不満 / 外的な希求", english: "Something is Wrong", desc: "一見満ち足りているように見えても、主人公の心には「何か（対外的なwant）」が欠けており、無意識のうちに本質的な変化（内的なneed）を求め始めます。", tip: "欲しいもの(Want)と本当に必要なもの(Need)のギャップが物語を動かします。" },
            3: { name: "GO", jp: "未知への旅立ち", status: "非日常への越境", english: "Crossing the Threshold", desc: "現状維持を捨て去り、引き返せない一線を越えて「未知の状況」や「新たな世界」へと自ら足を踏み入れます。ここから混沌の領域が始まります。", tip: "日常から非日常への境界線を明確にし、緊張感を高めます。" },
            4: { name: "SEARCH", jp: "探索と適応", status: "試練と学習", english: "Road of Trials", desc: "不慣れな未知の環境に直面し、主人公は数々の試練やトラブルに見舞われます。それらに対処し、失敗を繰り返しながら、徐々にその世界へ適応していきます。", tip: "失敗を通して主人公が新しいスキルや価値観を学ぶ、最も動きのある段階です。" },
            5: { name: "FIND", jp: "発見と獲得", status: "核心への到達", english: "Meeting with the Goddess", desc: "数々の苦難を乗り越えた末に、主人公はついに「探していたもの（真実、武器、鍵、あるいは気づき）」を手に入れています。しかし、それは束の間の勝利です。", tip: "サークルの最底（最も日常から遠い場所）で、最大の真実に巡り会います。" },
            6: { name: "TAKE", jp: "代償の支払い", status: "大きな喪失", english: "Paying the Price", desc: "何かを手に入れることには、必ず大きな代償が伴います。最も価値あるものを得るため、主人公は物理的、精神的、あるいは親しい仲間などの「手痛い代償」を支払います。", tip: "ただ得るだけでなく、痛みを伴うことで「手に入れたもの」の重みが増します。" },
            7: { name: "RETURN", jp: "帰還", status: "元の場所へ", english: "Bringing it Home", desc: "目的を遂げ、代償を払った主人公は、ついに自分が最初に飛び出した「元々いた馴染み深い日常の場所」へと向かって、帰路につきます。", tip: "非日常から日常の枠組みに戻ることで、旅の完結が近づきます。" },
            8: { name: "CHANGE", jp: "変化と新生", status: "決定的な変容", english: "Master of Both Worlds", desc: "元の場所に戻った主人公ですが、もはや以前の自分ではありません。経験と喪失を経て「内面的に決定的な変化」を遂げ、新しい目線で世界を見つめています。", tip: "サークルが1周した時、螺旋階段を登ったように主人公の魂は進化しています。" }
        };

        let currentActive = 1;

        function selectStep(stepNum) {
            const prevNode = document.getElementById(`node-${currentActive}`);
            if (prevNode) {
                const innerSpan = prevNode.querySelector('span');
                innerSpan.className = "flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs bg-white border-gray-200 text-gray-400";
            }

            currentActive = stepNum;
            const activeNode = document.getElementById(`node-${stepNum}`);
            if (activeNode) {
                const innerSpan = activeNode.querySelector('span');
                innerSpan.className = "flex items-center justify-center w-9 h-9 rounded-full border font-bold text-xs shadow-sm bg-white border-[#111111] text-[#111111] scale-110";
            }

            const data = stepsData[stepNum];

            document.getElementById('center-num').innerText = `STEP ${stepNum}`;
            document.getElementById('center-name').innerText = data.name;
            document.getElementById('center-jp').innerText = data.jp;

            const infoDesc = document.getElementById('info-desc');
            infoDesc.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('info-badge').innerText = `${stepNum}. ${data.name} / ${data.jp}`;
                document.getElementById('info-status').innerText = data.status;
                document.getElementById('info-english').innerText = `"${data.english}"`;
                infoDesc.innerText = data.desc;
                document.getElementById('info-tip').innerText = data.tip;
                infoDesc.style.opacity = '1';
            }, 100);
        }

        window.onload = function() {
            selectStep(1);
        };
    </script>
</body>
</html>
